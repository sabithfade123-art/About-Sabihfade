<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game | Sabith</title>

<style>

body{
margin:0;
background:#050505;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:#00ff88;
filter:blur(150px);
opacity:.15;
top:-100px;
left:-100px;
z-index:-1;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#00d4ff;
filter:blur(150px);
opacity:.12;
bottom:-100px;
right:-100px;
z-index:-1;
}

h1{
margin-bottom:10px;
background:linear-gradient(90deg,#00ff88,#00d4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.stats{
display:flex;
gap:20px;
margin-bottom:15px;
font-size:18px;
}

canvas{
border:2px solid rgba(255,255,255,.2);
background:#0a0a0a;
border-radius:15px;
box-shadow:0 0 25px rgba(0,255,136,.2);
}

.controls{
margin-top:15px;
display:grid;
grid-template-columns:70px 70px 70px;
gap:8px;
}

button{
background:rgba(255,255,255,.08);
color:white;
border:none;
padding:12px;
border-radius:12px;
font-size:18px;
}

.gameover{
display:none;
position:absolute;
background:rgba(0,0,0,.85);
padding:30px;
border-radius:20px;
text-align:center;
}

.restart{
margin-top:15px;
background:#00ff88;
color:black;
font-weight:bold;
}

</style>
</head>
<body>

<h1>🐍 SNAKE GAME</h1>

<div class="stats">
<div>Score: <span id="score">0</span></div>
<div>High Score: <span id="highscore">0</span></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
<div></div>
<button onclick="changeDir('up')">⬆️</button>
<div></div>

<button onclick="changeDir('left')">⬅️</button>
<button onclick="changeDir('down')">⬇️</button>
<button onclick="changeDir('right')">➡️</button>
</div>

<div class="gameover" id="gameover">
<h2>GAME OVER</h2>
<p>Your Score: <span id="finalscore"></span></p>
<button class="restart" onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;

let snake = [
{x:10*box,y:10*box}
];

let food = {
x:Math.floor(Math.random()*20)*box,
y:Math.floor(Math.random()*20)*box
};

let score = 0;

let highscore = localStorage.getItem("snakeHigh") || 0;
document.getElementById("highscore").innerText = highscore;

let direction = "RIGHT";

document.addEventListener("keydown",event=>{

if(event.key==="ArrowUp" && direction!="DOWN")
direction="UP";

if(event.key==="ArrowDown" && direction!="UP")
direction="DOWN";

if(event.key==="ArrowLeft" && direction!="RIGHT")
direction="LEFT";

if(event.key==="ArrowRight" && direction!="LEFT")
direction="RIGHT";

});

function changeDir(dir){

if(dir==="up" && direction!="DOWN")
direction="UP";

if(dir==="down" && direction!="UP")
direction="DOWN";

if(dir==="left" && direction!="RIGHT")
direction="LEFT";

if(dir==="right" && direction!="LEFT")
direction="RIGHT";

}

function collision(head,array){

for(let i=0;i<array.length;i++){

if(head.x===array[i].x && head.y===array[i].y)
return true;

}

return false;

}

function draw(){

ctx.fillStyle="#0a0a0a";
ctx.fillRect(0,0,400,400);

for(let i=0;i<snake.length;i++){

ctx.fillStyle=i==0?"#00ff88":"#00d4ff";
ctx.fillRect(snake[i].x,snake[i].y,18,18);

}

ctx.fillStyle="#ff4444";
ctx.fillRect(food.x,food.y,18,18);

let snakeX = snake[0].x;
let snakeY = snake[0].y;

if(direction=="LEFT") snakeX-=box;
if(direction=="UP") snakeY-=box;
if(direction=="RIGHT") snakeX+=box;
if(direction=="DOWN") snakeY+=box;

if(
snakeX<0 ||
snakeY<0 ||
snakeX>=400 ||
snakeY>=400 ||
collision({x:snakeX,y:snakeY},snake)
){

clearInterval(game);

document.getElementById("finalscore").innerText=score;
document.getElementById("gameover").style.display="block";

return;

}

if(snakeX===food.x && snakeY===food.y){

score++;

document.getElementById("score").innerText=score;

if(score>highscore){

highscore=score;
localStorage.setItem("snakeHigh",highscore);
document.getElementById("highscore").innerText=highscore;

}

food={
x:Math.floor(Math.random()*20)*box,
y:Math.floor(Math.random()*20)*box
};

}else{

snake.pop();

}

let newHead={
x:snakeX,
y:snakeY
};

snake.unshift(newHead);

}

let game=setInterval(draw,120);

</script>

</body>
</html>
